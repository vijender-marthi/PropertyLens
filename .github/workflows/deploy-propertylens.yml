name: Deploy PropertyLens

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  standards:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run standards validation
        run: npm run standards:check

  deploy:
    needs: standards
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to DigitalOcean droplet
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          port: ${{ secrets.DO_PORT || '22' }}
          script: |
            set -euo pipefail

            sudo chown -R "$(whoami):$(id -gn)" /opt/propertylens/PropertyLens
            cd /opt/propertylens/PropertyLens
            git fetch origin
            git checkout main
            git pull --ff-only origin main

            sudo env \
              APP_USER=fluxtrade \
              APP_GROUP=fluxtrade \
              PROPERTYLENS_HOST=127.0.0.1 \
              PROPERTYLENS_PORT=8100 \
              scripts/install-production-service.sh

            sudo systemctl reload nginx
            for attempt in $(seq 1 30); do
              if curl -fsS http://127.0.0.1:8100/api/health >/dev/null; then
                echo "PropertyLens health check passed"
                exit 0
              fi
              sleep 2
            done

            sudo journalctl -u propertylens -n 80 --no-pager
            exit 1
